<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    line-height: 1.6;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  .header {
    border-bottom: 1px solid #21262d;
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 1.5rem;
    color: #f0f6fc;
    margin-bottom: 0.5rem;
  }
  .header .meta {
    color: #8b949e;
    font-size: 0.875rem;
  }
  .header .meta span {
    margin-right: 1rem;
  }
  .stats {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }
  .stat {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
  }
  .stat strong { color: #58a6ff; }
  .entry {
    margin-bottom: 1rem;
    border-radius: 8px;
    overflow: hidden;
  }
  .entry-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .entry-header .role {
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .entry-header .timestamp { color: #484f58; }
  .entry-header .meta {
    color: #8b949e;
    font-weight: 400;
    font-size: 0.75rem;
  }
  .entry-content {
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .entry-user .entry-header { background: #1f2937; color: #60a5fa; }
  .entry-user .entry-content { background: #111827; }
  .entry-assistant .entry-header { background: #14532d; color: #4ade80; }
  .entry-assistant .entry-content { background: #052e16; }
  .entry-system .entry-header { background: #374151; color: #9ca3af; }
  .entry-system .entry-content { background: #1f2937; color: #9ca3af; font-style: italic; }
  .entry-tool .entry-header { background: #312e81; color: #a78bfa; }
  .entry-tool .entry-content { background: #1e1b4b; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; }
  .footer {
    border-top: 1px solid #21262d;
    margin-top: 2rem;
    padding-top: 1rem;
    text-align: center;
    color: #484f58;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<div class="header">
  <h1>⚔️ {{TITLE}}</h1>
  <div class="meta">
    <span>📅 {{CREATED}}</span>
    <span>🤖 {{MODEL}}</span>
  </div>
  <div class="stats">
    <div class="stat"><strong>{{ENTRY_COUNT}}</strong> entries</div>
  </div>
</div>

<div class="entries">
{{ENTRIES}}
</div>

<div class="footer">
  Generated by <strong>The Forge</strong> — The wielder and the sword are one.
</div>
</body>
</html>
