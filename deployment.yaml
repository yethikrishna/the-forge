apiVersion: v1
kind: Secret
metadata:
  name: {{ include "the-forge.fullname" . }}-keys
  labels:
    app: {{ include "the-forge.name" . }}
type: Opaque
data:
  {{- with .Values.secrets }}
  {{- if .anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .openaiApiKey }}
  OPENAI_API_KEY: {{ .openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .googleApiKey }}
  GOOGLE_API_KEY: {{ .googleApiKey | b64enc | quote }}
  {{- end }}
  {{- if .xaiApiKey }}
  XAI_API_KEY: {{ .xaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ .deepseekApiKey | b64enc | quote }}
  {{- end }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "the-forge.fullname" . }}
  labels:
    app: {{ include "the-forge.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "the-forge.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "the-forge.name" . }}
    spec:
      containers:
        - name: forge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["forge"]
          args: ["serve", "--port", "{{ .Values.forge.port }}", "--", "{{ .Values.forge.agentCommand }}"]
          ports:
            - containerPort: {{ .Values.forge.port }}
          env:
            - name: FORGE_PORT
              value: "{{ .Values.forge.port }}"
            - name: FORGE_MODEL
              value: "{{ .Values.forge.model }}"
          envFrom:
            - secretRef:
                name: {{ include "the-forge.fullname" . }}-keys
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "the-forge.fullname" . }}
  labels:
    app: {{ include "the-forge.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.forge.port }}
      protocol: TCP
  selector:
    app: {{ include "the-forge.name" . }}
